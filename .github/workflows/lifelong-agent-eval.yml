name: Lifelong Agent Eval

on:
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * *"

permissions:
  contents: read

jobs:
  lifelong-agent-eval:
    name: lifelong-agent-eval (24)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Use Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Run lifelong agent eval
        env:
          PULSEED_LIFELONG_EVAL_ARTIFACT: tmp/lifelong-agent-memory-profile-eval.json
        run: npm run test:lifelong-agent-eval
      - name: Upload lifelong agent eval artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lifelong-agent-memory-profile-eval
          path: tmp/lifelong-agent-memory-profile-eval.json
          if-no-files-found: error
