name: Lifelong Agent Eval

on:
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * *"

permissions:
  contents: read

jobs:
  lifelong-agent-eval:
    name: lifelong-agent-eval (24)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Use Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Run lifelong agent eval
        env:
          PULSEED_LIFELONG_EVAL_ARTIFACT: tmp/lifelong-agent-memory-profile-eval.json
        run: npm run test:lifelong-agent-eval
      - name: Upload lifelong agent eval artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lifelong-agent-memory-profile-eval
          path: tmp/lifelong-agent-memory-profile-eval.json
          if-no-files-found: error
